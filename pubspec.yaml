name: fotolou
description: Base Flutter professionnelle en Feature-First Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^6.1.5
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  equatable: ^2.0.7
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.2
  go_router: ^16.3.0
  json_annotation: ^4.12.0
  logger: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
  assets:
    - assets/images/onboarding/
    - assets/images/client/
    - assets/icons/onboarding/
